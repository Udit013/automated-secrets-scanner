services:
  - type: web
    name: secrets-scanner-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_demo.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./secrets_scanner.db
      - key: CORS_ORIGINS
        value: https://secrets-scanner.vercel.app,https://automated-secrets-scanner.vercel.app
      - key: GITHUB_TOKEN
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: BACKEND_URL
        sync: false
