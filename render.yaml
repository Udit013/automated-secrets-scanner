services:
  - type: web
    name: secrets-scanner-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: secrets-scanner-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://secrets-scanner.vercel.app
      - key: GITHUB_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_EMAIL
        sync: false

databases:
  - name: secrets-scanner-db
    databaseName: secrets_scanner
    user: scanner
    plan: free
